#Connection url for connection in the DatabaseView:
#  jdbc:mysql://0.0.0.0:13306/DOCKERDB, login=root, password=root
#App is available at: http://localhost:<local-port>/entitybus/post
#version: "3.8"
networks:
  net:
    name: test

services:
  java:
    #platform: linux/x86_64
    build:
      context: .
      dockerfile: Dockerfile
    image: appdemo
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - net

  mysql:
    #platform: linux/x86_64
    image: mysql:8.0
    #container_name: mysql8
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: demo_db
    command: [
      #'--default-authentication-plugin=mysql_native_password',
      '--lower-case-table-names=1'
    ]
    volumes:
      - mysql_data:/var/lib/mysql
    #volumes:
    #  - /home/huangmh/Projects/SpringbootAppDemo/mysql_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: [ "CMD", "mysql", "-h", "localhost", "-P", "3306", "-u", "root", "--password=root", "-e", "select 1", "demo_db" ]
      interval: 1s
      timeout: 3s
      retries: 30
    networks:
      - net

volumes:
  mysql_data:
    name: demo_db